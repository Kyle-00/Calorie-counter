<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack - Daily Calorie Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header with text symbols-->
  <header>
    <div class="leaf-accent left-leaf">✤</div>
    <div class="leaf-accent right-leaf">✤</div>
    <p class="brand-subtitle">Daily Nutrition</p>
    <h1>Nutri<span class="accent-text">Track</span></h1>
    <p class="date-text" id="todayDate"></p>
  </header>

  <main class="main-container">
    <!-- Calorie Ring Summary -->
    <section class="calorie-card">
      <div class="ring-container">
        <svg viewBox="0 0 120 120" class="calorie-ring">
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="50"
            stroke-dasharray="314"
            stroke-dashoffset="314" />
        </svg>
        <div class="ring-label">
          <span class="ring-number" id="totalCalories">0</span>
          <span class="ring-unit">kcal</span>
        </div>
      </div>
      <div class="card-info">
        <div class="goal-wrapper">
          <label class="goal-label" for="goalInput">Daily Goal</label>
          <div class="goal-input-group">
            <input type="number" id="goalInput" class="goal-input" value="2000" placeholder="Daily calorie goal" title="Enter your daily calorie goal" min="500" max="9999" />
            <span class="goal-unit">kcal</span>
          </div>
        </div>
        <div id="summaryStats" class="stats-grid">
          <div class="stat-chip">
            <span class="stat-label">Remaining</span>
            <span class="stat-val" id="remaining">2000</span>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Items</span>
            <span class="stat-val" id="itemCount">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Add Food Form -->
    <section class="form-card">
      <h2>Add Food Item</h2>

      <!-- Quick search suggestions -->
      <div class="suggestions-section">
        <p class="suggestions-label">Quick Add</p>
        <div class="suggestions-buttons" id="suggestions"></div>
      </div>

      <div class="form-row">
        <div class="input-field">
          <input type="text" id="foodName"
            placeholder="Food name (e.g. Banana)"
            class="food-input"
            autocomplete="off" />
        </div>
        <div class="input-field-small">
          <input type="number" id="foodCalories"
            placeholder="Calories"
            class="food-input"
            min="1" max="9999" />
        </div>
        <button id="addBtn" class="add-btn">+ Add</button>
      </div>
      <p class="form-error hidden" id="formError">Please enter both a name and calorie count.</p>
    </section>

    <!-- Food List -->
    <section class="list-card">
      <div class="list-header">
        <h2>Today's Food Log</h2>
        <button id="resetBtn" class="reset-btn">Reset Day</button>
      </div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">[ Salad ]</div>
        <p>No food logged yet.<br/>Start by adding your first meal!</p>
      </div>

      <ul id="foodList" class="food-items-list hidden"></ul>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="script.js" defer></script>
</body>
</html>
